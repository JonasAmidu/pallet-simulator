name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r backend/requirements.txt
        working-directory: backend

      - name: Syntax check
        run: python -m py_compile backend/main.py

      - name: Unit smoke test
        run: |
          python -c "
import sys, os, importlib.util
sys.path.insert(0, os.path.join(os.getcwd(), 'backend'))
for mod in ['models.pallet','models.conveyor','models.lift','models.rack','models.scanner','models.plc','physics.physics','bus.modbus','faults.injector','api.websocket']:
    spec = importlib.util.find_spec(mod, package='backend')
    if spec is None:
        print(f'MISSING: {mod}')
        sys.exit(1)
print('All modules OK')
"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
